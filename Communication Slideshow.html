  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c6c85981-4eb2-4c27-9488-9909641b990e\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"682f04a0-cebd-49d2-ada3-0d4dbefb017d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"df3b6df5-4bed-4ed4-af1a-eb731be9f5c4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"aab0a8cb-9f1b-42f1-9941-5cfe936def98\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* surfaces */\n  --paper:      oklch(0.972 0.013 74);   /* warm cream page */\n  --paper-2:    oklch(0.955 0.018 72);   /* deeper cream */\n  --surface:    oklch(0.993 0.006 80);   /* warm near-white card */\n  --navy:       oklch(0.255 0.052 264);  /* deep navy section bg */\n  --navy-2:     oklch(0.205 0.05 264);   /* darker navy */\n\n  /* ink */\n  --ink:        oklch(0.285 0.05 264);   /* primary text — soft navy */\n  --ink-soft:   oklch(0.46 0.04 264);    /* secondary text */\n  --ink-faint:  oklch(0.63 0.03 264);    /* tertiary / captions */\n  --on-navy:    oklch(0.96 0.013 74);    /* text on navy */\n  --on-navy-soft: oklch(0.78 0.02 264);\n\n  /* accents — shared chroma/lightness, varied hue */\n  --coral:      oklch(0.645 0.155 27);   /* primary warm coral */\n  --coral-deep: oklch(0.56 0.16 27);\n  --coral-soft: oklch(0.92 0.05 40);     /* coral tint wash */\n  --blue:       oklch(0.55 0.11 252);    /* secondary cool accent */\n  --blue-soft:  oklch(0.93 0.035 250);\n  --gold:       oklch(0.78 0.11 78);     /* highlight */\n\n  /* lines & shadows */\n  --line:       oklch(0.86 0.018 70);\n  --line-strong:oklch(0.78 0.025 70);\n  --shadow-sm:  0 1px 2px oklch(0.3 0.04 264 / 0.06), 0 2px 8px oklch(0.3 0.04 264 / 0.05);\n  --shadow-md:  0 4px 14px oklch(0.3 0.04 264 / 0.08), 0 12px 34px oklch(0.3 0.04 264 / 0.07);\n  --shadow-lg:  0 10px 40px oklch(0.3 0.04 264 / 0.14);\n\n  /* type */\n  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;\n  --font-text: 'Hanken Grotesk', system-ui, sans-serif;\n\n  --r-sm: 10px;\n  --r-md: 16px;\n  --r-lg: 24px;\n  --r-xl: 34px;\n}\n\n* { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-text);\n  color: var(--ink);\n  background: var(--paper);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  line-height: 1.04;\n  letter-spacing: -0.02em;\n  margin: 0;\n  text-wrap: balance;\n}\n\n/* ---- shared atoms ---- */\n.kit-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.5em;\n  font-family: var(--font-text);\n  font-weight: 700;\n  font-size: 0.78rem;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--coral-deep);\n  background: var(--coral-soft);\n  padding: 0.5em 0.9em;\n  border-radius: 999px;\n}\n\n.kit-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.55em;\n  font-family: var(--font-text);\n  font-weight: 700;\n  font-size: 1rem;\n  border: none;\n  border-radius: 999px;\n  padding: 0.85em 1.5em;\n  cursor: pointer;\n  text-decoration: none;\n  transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;\n}\n.kit-btn--primary { background: var(--coral); color: white; box-shadow: var(--shadow-sm); }\n.kit-btn--primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }\n.kit-btn--ghost { background: transparent; color: var(--ink); box-shadow: inset 0 0 0 1.5px var(--line-strong); }\n.kit-btn--ghost:hover { background: var(--surface); transform: translateY(-2px); }\n\n/* image / media placeholder */\n.kit-ph {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  background-color: var(--paper-2);\n  background-image: repeating-linear-gradient(\n    -45deg,\n    transparent, transparent 9px,\n    oklch(0.86 0.02 70 / 0.55) 9px, oklch(0.86 0.02 70 / 0.55) 10px\n  );\n  border-radius: var(--r-md);\n  color: var(--ink-faint);\n  font-family: ui-monospace, 'SF Mono', Menlo, monospace;\n  font-size: 0.8rem;\n  letter-spacing: 0.02em;\n  text-align: center;\n  padding: 1rem;\n}\n\n\ndeck-stage:not(:defined) { visibility: hidden; }\ndeck-stage { background: var(--navy-2); }\n\n/* every slide fills the canvas */\nsection { overflow: hidden; }\n.s {\n  width: 100%; height: 100%;\n  display: flex; flex-direction: column;\n  padding: 96px 120px;\n  background: var(--paper);\n  color: var(--ink);\n  position: relative;\n}\n.s--navy { background: var(--navy); color: var(--on-navy); }\n.s--coral { background: var(--coral); color: #fff; }\n.s--center { justify-content: center; }\n\n/* kicker / eyebrow */\n.kick { font-family: var(--font-text); font-weight: 800; font-size: 26px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--coral-deep); margin-bottom: 26px; }\n.s--navy .kick, .s--coral .kick { color: inherit; opacity: 0.7; }\n\nh1.title { font-size: 132px; font-weight: 800; letter-spacing: -0.03em; line-height: 0.98; }\nh2.head  { font-size: 84px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.0; }\nh3.sub   { font-size: 46px; font-weight: 600; }\n.lead { font-size: 38px; line-height: 1.45; color: var(--ink-soft); max-width: 26ch; }\n.s--navy .lead, .s--coral .lead { color: inherit; opacity: 0.85; }\n\n/* footer brand on every content slide */\n.brandbar { position: absolute; left: 120px; right: 120px; bottom: 52px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-text); font-size: 22px; color: var(--ink-faint); letter-spacing: 0.04em; }\n.s--navy .brandbar, .s--coral .brandbar { color: rgba(255,255,255,.6); }\n.brandbar .b-logo { display: flex; align-items: center; gap: 12px; font-weight: 800; color: var(--coral-deep); }\n.s--navy .brandbar .b-logo, .s--coral .brandbar .b-logo { color: #fff; }\n.brandbar .b-logo .d { width: 14px; height: 14px; border-radius: 50%; background: var(--coral); }\n\n.pillnum { font-family: var(--font-display); font-weight: 800; font-size: 320px; line-height: 0.8; opacity: 0.14; position: absolute; right: 90px; bottom: 10px; }\n\n/* generic chip on dark */\n.chip-d { display:inline-flex; align-items:center; gap:10px; font-weight:700; font-size:24px; letter-spacing:.12em; text-transform:uppercase; padding:12px 22px; border-radius:999px; background: rgba(255,255,255,.14); }\n\n/* cards row */\n.row { display: flex; gap: 30px; }\n.col { flex: 1; }\n.tile { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 40px; box-shadow: var(--shadow-sm); }\n\n/* speech bubble */\n.bub { background: var(--surface); border-radius: 30px 30px 30px 8px; padding: 30px 38px; font-size: 34px; box-shadow: var(--shadow-md); line-height: 1.35; }\n.bub.me { background: var(--coral); color:#fff; border-radius: 30px 30px 8px 30px; }\n.bub.navy { background: var(--navy); color: var(--on-navy); }\n\n/* interactive reveal buttons */\n.reveal-card { cursor: pointer; transition: transform .25s ease, box-shadow .25s ease; }\n.reveal-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }\n.reveal-front, .reveal-back { transition: opacity .3s ease; }\n.is-flipped .reveal-front { display:none; }\n.reveal-back { display:none; }\n.is-flipped .reveal-back { display:block; }\n\n/* poll bars */\n.pollbar { height: 64px; border-radius: 14px; background: var(--paper-2); position: relative; overflow:hidden; }\n.pollbar > i { position:absolute; left:0; top:0; bottom:0; width:0; background: var(--coral); border-radius:14px; transition: width 1.1s cubic-bezier(.2,.8,.2,1); }\n\n.hint { font-size: 22px; color: var(--ink-faint); font-style: italic; display:flex; align-items:center; gap:10px; }\n.s--navy .hint, .s--coral .hint { color: rgba(255,255,255,.7); }\n\n.tap-pulse { animation: tapPulse 2s ease-in-out infinite; }\n@keyframes tapPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 01 · TITLE -->\n  <section data-label=\"Title\">\n    <div class=\"s s--navy s--center\">\n      <span class=\"chip-d\" style=\"align-self:flex-start\">Soft Skills Training<\u002Fspan>\n      <h1 class=\"title\" style=\"margin-top:40px\">Communi­cation<\u002Fh1>\n      <p class=\"lead\" style=\"margin-top:34px;font-size:42px;max-width:34ch\">The one skill behind every other skill. Let's spend 15 minutes getting better at it — together.<\u002Fp>\n      <div style=\"position:absolute;right:120px;bottom:120px;text-align:right;font-size:26px;line-height:1.7;color:rgba(255,255,255,.7)\">\n        <div style=\"color:#fff;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:22px\">Presented by<\u002Fdiv>\n        <div>Group members: ______________<\u002Fdiv>\n        <div>______________ · ______________<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bub me\" style=\"position:absolute;right:120px;top:120px;transform:rotate(4deg);font-size:40px\">Can you hear me? 🙂<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 · HOOK / POLL -->\n  <section data-label=\"Hook\">\n    <div class=\"s\">\n      <span class=\"kick\">Quick gut-check<\u002Fspan>\n      <h2 class=\"head\" style=\"max-width:24ch\">How much of a message actually gets through?<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:22px\">Tap a bar to lock in your guess — then we'll reveal the research.<\u002Fp>\n      <div style=\"margin-top:54px;display:flex;flex-direction:column;gap:26px;max-width:1200px\" id=\"poll\">\n        <div style=\"display:flex;align-items:center;gap:28px\"><span style=\"font-size:30px;font-weight:700;width:90px\">90%<\u002Fspan><div class=\"pollbar\" style=\"flex:1\" data-fill=\"90\"><i><\u002Fi><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:28px\"><span style=\"font-size:30px;font-weight:700;width:90px\">70%<\u002Fspan><div class=\"pollbar\" style=\"flex:1\" data-fill=\"70\"><i><\u002Fi><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:28px\"><span style=\"font-size:30px;font-weight:700;width:90px\">50%<\u002Fspan><div class=\"pollbar\" style=\"flex:1\" data-fill=\"50\"><i><\u002Fi><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hint\" style=\"margin-top:30px\" id=\"pollHint\"><span>👆<\u002Fspan> Click a bar — the reveal is coming.<\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Warm-up<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 · BIG STAT REVEAL -->\n  <section data-label=\"Stat\">\n    <div class=\"s s--coral s--center\">\n      <span class=\"kick\">The reality<\u002Fspan>\n      <div style=\"display:flex;align-items:baseline;gap:30px;flex-wrap:wrap\">\n        <span style=\"font-family:var(--font-display);font-weight:800;font-size:300px;line-height:0.8\">~50%<\u002Fspan>\n        <span style=\"font-size:48px;font-weight:600;max-width:18ch\">of what we intend to say is what the other person actually receives.<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"lead\" style=\"margin-top:40px;color:#fff;opacity:.92;max-width:40ch;font-size:38px\">Tone, attention, wording and assumptions eat the rest. Good communication is about closing that gap on purpose.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 · AGENDA -->\n  <section data-label=\"Agenda\">\n    <div class=\"s\">\n      <span class=\"kick\">Today's training<\u002Fspan>\n      <h2 class=\"head\">Three pillars, one goal<\u002Fh2>\n      <div class=\"row\" style=\"margin-top:64px\">\n        <div class=\"col tile\" style=\"border-top:8px solid var(--coral)\">\n          <div style=\"font-size:30px;font-weight:800;color:var(--coral-deep)\">Pillar 01<\u002Fdiv>\n          <h3 class=\"sub\" style=\"margin:14px 0 16px\">Active Listening<\u002Fh3>\n          <p style=\"font-size:30px;color:var(--ink-soft);line-height:1.4\">Really hearing — not just waiting to talk.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"col tile\" style=\"border-top:8px solid var(--blue)\">\n          <div style=\"font-size:30px;font-weight:800;color:var(--blue)\">Pillar 02<\u002Fdiv>\n          <h3 class=\"sub\" style=\"margin:14px 0 16px\">Written &amp; Digital<\u002Fh3>\n          <p style=\"font-size:30px;color:var(--ink-soft);line-height:1.4\">Email &amp; chat that's clear the first time.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"col tile\" style=\"border-top:8px solid var(--gold)\">\n          <div style=\"font-size:30px;font-weight:800;color:var(--ink)\">Pillar 03<\u002Fdiv>\n          <h3 class=\"sub\" style=\"margin:14px 0 16px\">Feedback<\u002Fh3>\n          <p style=\"font-size:30px;color:var(--ink-soft);line-height:1.4\">Giving it kindly, taking it gracefully.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lead\" style=\"margin-top:50px;font-size:30px\">Then we'll prove it with a quick <b>game<\u002Fb> and a hands-on <b>activity<\u002Fb>.<\u002Fp>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Agenda<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 · PILLAR 1 DIVIDER -->\n  <section data-label=\"Pillar 1\">\n    <div class=\"s s--navy s--center\">\n      <span class=\"chip-d\" style=\"align-self:flex-start\">Pillar 01<\u002Fspan>\n      <h2 class=\"head\" style=\"font-size:120px;margin-top:30px\">Active Listening<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:28px;font-size:42px\">\"We have two ears and one mouth so that we can listen twice as much as we speak.\"<\u002Fp>\n      <span class=\"pillnum\">01<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 · LISTENING LADDER (interactive reveal) -->\n  <section data-label=\"Listening levels\">\n    <div class=\"s\">\n      <span class=\"kick\">Pillar 01 · Active Listening<\u002Fspan>\n      <h2 class=\"head\">There are levels to listening<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:18px;font-size:30px\">Click each card to see what it looks like.<\u002Fp>\n      <div class=\"row\" style=\"margin-top:48px\" id=\"levels\">\n        <div class=\"col tile reveal-card\" style=\"min-height:340px\">\n          <div class=\"reveal-front\"><div style=\"font-size:64px\">😶<\u002Fdiv><h3 class=\"sub\" style=\"margin:18px 0 0;font-size:40px\">Ignoring<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:10px\">Not really there.<\u002Fp><\u002Fdiv>\n          <div class=\"reveal-back\"><h3 class=\"sub\" style=\"font-size:36px;color:var(--coral-deep)\">Looks like…<\u002Fh3><p style=\"font-size:30px;line-height:1.4;margin-top:14px\">Phone out, eyes elsewhere, \"mm-hmm\" on autopilot.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col tile reveal-card\" style=\"min-height:340px\">\n          <div class=\"reveal-front\"><div style=\"font-size:64px\">🙂<\u002Fdiv><h3 class=\"sub\" style=\"margin:18px 0 0;font-size:40px\">Pretending<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:10px\">Nodding along.<\u002Fp><\u002Fdiv>\n          <div class=\"reveal-back\"><h3 class=\"sub\" style=\"font-size:36px;color:var(--coral-deep)\">Looks like…<\u002Fh3><p style=\"font-size:30px;line-height:1.4;margin-top:14px\">Agreeing fast, but can't repeat what was said.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col tile reveal-card\" style=\"min-height:340px\">\n          <div class=\"reveal-front\"><div style=\"font-size:64px\">🎯<\u002Fdiv><h3 class=\"sub\" style=\"margin:18px 0 0;font-size:40px\">Attentive<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:10px\">Focused on words.<\u002Fp><\u002Fdiv>\n          <div class=\"reveal-back\"><h3 class=\"sub\" style=\"font-size:36px;color:var(--coral-deep)\">Looks like…<\u002Fh3><p style=\"font-size:30px;line-height:1.4;margin-top:14px\">Eye contact, no interrupting, taking it in.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col tile reveal-card\" style=\"min-height:340px;border:2px solid var(--coral)\">\n          <div class=\"reveal-front\"><div style=\"font-size:64px\">💛<\u002Fdiv><h3 class=\"sub\" style=\"margin:18px 0 0;font-size:40px\">Empathic<\u002Fh3><p style=\"font-size:28px;color:var(--coral-deep);margin-top:10px;font-weight:700\">The goal<\u002Fp><\u002Fdiv>\n          <div class=\"reveal-back\"><h3 class=\"sub\" style=\"font-size:36px;color:var(--coral-deep)\">Looks like…<\u002Fh3><p style=\"font-size:30px;line-height:1.4;margin-top:14px\">Hearing feelings too — \"Sounds like that was stressful.\"<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Active Listening<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 · L.I.S.T.E.N toolkit -->\n  <section data-label=\"Listen toolkit\">\n    <div class=\"s\">\n      <span class=\"kick\">Pillar 01 · Active Listening<\u002Fspan>\n      <h2 class=\"head\">5 things great listeners do<\u002Fh2>\n      <div style=\"margin-top:56px;display:grid;grid-template-columns:1fr 1fr;gap:28px 56px;max-width:1500px\">\n        <div style=\"display:flex;gap:24px;align-items:flex-start\"><span style=\"font-size:46px\">🔇<\u002Fspan><div><h3 class=\"sub\" style=\"font-size:38px\">Give full attention<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:6px\">Phone down, body turned toward the speaker.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start\"><span style=\"font-size:46px\">🔁<\u002Fspan><div><h3 class=\"sub\" style=\"font-size:38px\">Paraphrase back<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:6px\">\"So what you're saying is…\" to confirm.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start\"><span style=\"font-size:46px\">❓<\u002Fspan><div><h3 class=\"sub\" style=\"font-size:38px\">Ask, don't assume<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:6px\">Open questions beat filling in blanks.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start\"><span style=\"font-size:46px\">⏸️<\u002Fspan><div><h3 class=\"sub\" style=\"font-size:38px\">Let silence sit<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:6px\">A pause invites more than a quick reply.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start\"><span style=\"font-size:46px\">👀<\u002Fspan><div><h3 class=\"sub\" style=\"font-size:38px\">Read the body language<\u002Fh3><p style=\"font-size:28px;color:var(--ink-soft);margin-top:6px\">Tone &amp; face often say more than words.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"bub navy\" style=\"font-size:30px;align-self:center\">Try this today: in your next chat, paraphrase once before you reply.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Active Listening<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 · PILLAR 2 DIVIDER -->\n  <section data-label=\"Pillar 2\">\n    <div class=\"s s--navy s--center\">\n      <span class=\"chip-d\" style=\"align-self:flex-start\">Pillar 02<\u002Fspan>\n      <h2 class=\"head\" style=\"font-size:120px;margin-top:30px\">Written &amp; Digital<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:28px;font-size:42px\">Email, chat, DMs, comments — most of how we talk at school &amp; work has no tone of voice attached.<\u002Fp>\n      <span class=\"pillnum\">02<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 · BEFORE / AFTER EMAIL (interactive toggle) -->\n  <section data-label=\"Before/After\">\n    <div class=\"s\">\n      <span class=\"kick\">Pillar 02 · Written &amp; Digital<\u002Fspan>\n      <h2 class=\"head\">Same message, different result<\u002Fh2>\n      <div style=\"display:flex;gap:24px;margin-top:36px\">\n        <button class=\"kit-btn kit-btn--primary tap-pulse\" id=\"baToggle\" style=\"font-size:26px\">Show the fix →<\u002Fbutton>\n        <span class=\"hint\" style=\"align-self:center\">Watch the email transform.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px;max-width:1300px\">\n        <div class=\"tile\" id=\"emailCard\" style=\"padding:0;overflow:hidden\">\n          <div style=\"padding:24px 38px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center\">\n            <div style=\"font-size:28px;color:var(--ink-soft)\"><b style=\"color:var(--ink)\">To:<\u002Fb> the team &nbsp; <b style=\"color:var(--ink)\">Subject:<\u002Fb> <span id=\"emSubj\">stuff<\u002Fspan><\u002Fdiv>\n            <span id=\"emBadge\" style=\"font-weight:800;font-size:24px;color:var(--coral-deep);background:var(--coral-soft);padding:8px 18px;border-radius:999px\">Before<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:38px;font-size:34px;line-height:1.5\" id=\"emBody\">\n            hey did u finish the thing?? need it asap. also the other stuff isnt right\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\" id=\"baNotes\" style=\"margin-top:30px;display:none;gap:18px\">\n          <div class=\"bub\" style=\"font-size:26px;flex:1\">✅ Clear subject &amp; ask<\u002Fdiv>\n          <div class=\"bub\" style=\"font-size:26px;flex:1\">✅ Specific, not \"the thing\"<\u002Fdiv>\n          <div class=\"bub\" style=\"font-size:26px;flex:1\">✅ A real deadline<\u002Fdiv>\n          <div class=\"bub\" style=\"font-size:26px;flex:1\">✅ Warm, human tone<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Written &amp; Digital<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 · DIGITAL RULES -->\n  <section data-label=\"Digital rules\">\n    <div class=\"s\">\n      <span class=\"kick\">Pillar 02 · Written &amp; Digital<\u002Fspan>\n      <h2 class=\"head\">Write so they can't misread you<\u002Fh2>\n      <div class=\"row\" style=\"margin-top:56px\">\n        <div class=\"col tile\"><div style=\"font-size:30px;font-weight:800;color:var(--coral-deep)\">Lead with the ask<\u002Fdiv><p style=\"font-size:30px;color:var(--ink-soft);margin-top:14px;line-height:1.4\">Put the point in the first line. Don't bury it.<\u002Fp><\u002Fdiv>\n        <div class=\"col tile\"><div style=\"font-size:30px;font-weight:800;color:var(--coral-deep)\">Be specific<\u002Fdiv><p style=\"font-size:30px;color:var(--ink-soft);margin-top:14px;line-height:1.4\">\"By Friday 3pm,\" not \"soon.\" Names, dates, numbers.<\u002Fp><\u002Fdiv>\n        <div class=\"col tile\"><div style=\"font-size:30px;font-weight:800;color:var(--coral-deep)\">Mind the tone<\u002Fdiv><p style=\"font-size:30px;color:var(--ink-soft);margin-top:14px;line-height:1.4\">No tone of voice online — read it out loud first.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bub navy\" style=\"margin-top:44px;font-size:32px;align-self:flex-start;max-width:36ch\">Rule of thumb: if it would take more than 3 messages to sort out, just call or talk in person.<\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Written &amp; Digital<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 · PILLAR 3 DIVIDER -->\n  <section data-label=\"Pillar 3\">\n    <div class=\"s s--navy s--center\">\n      <span class=\"chip-d\" style=\"align-self:flex-start\">Pillar 03<\u002Fspan>\n      <h2 class=\"head\" style=\"font-size:120px;margin-top:30px\">Feedback<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:28px;font-size:42px\">The skill that makes teams better — when it's given with care and received without armour.<\u002Fp>\n      <span class=\"pillnum\">03<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 · SBI FORMULA (interactive build) -->\n  <section data-label=\"Feedback formula\">\n    <div class=\"s\">\n      <span class=\"kick\">Pillar 03 · Feedback<\u002Fspan>\n      <h2 class=\"head\">A formula that takes the sting out<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:18px;font-size:30px\">Click to build the <b>S·B·I<\u002Fb> sentence, piece by piece.<\u002Fp>\n      <div style=\"margin-top:50px;display:flex;flex-direction:column;gap:24px;max-width:1500px\" id=\"sbi\">\n        <div class=\"tile sbi-step\" data-i=\"0\" style=\"cursor:pointer;border-left:10px solid var(--coral);opacity:.5\"><div style=\"display:flex;gap:24px;align-items:center\"><span style=\"font-family:var(--font-display);font-weight:800;font-size:60px;color:var(--coral)\">S<\u002Fspan><div><b style=\"font-size:34px\">Situation<\u002Fb><p class=\"sbi-ex\" style=\"font-size:30px;color:var(--ink-soft);margin-top:6px;display:none\">\"In yesterday's group meeting…\"<\u002Fp><p class=\"sbi-lbl\" style=\"font-size:28px;color:var(--ink-faint);margin-top:6px\">When &amp; where it happened<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"tile sbi-step\" data-i=\"1\" style=\"cursor:pointer;border-left:10px solid var(--blue);opacity:.5\"><div style=\"display:flex;gap:24px;align-items:center\"><span style=\"font-family:var(--font-display);font-weight:800;font-size:60px;color:var(--blue)\">B<\u002Fspan><div><b style=\"font-size:34px\">Behaviour<\u002Fb><p class=\"sbi-ex\" style=\"font-size:30px;color:var(--ink-soft);margin-top:6px;display:none\">\"…you took notes for everyone…\"<\u002Fp><p class=\"sbi-lbl\" style=\"font-size:28px;color:var(--ink-faint);margin-top:6px\">What they actually did (facts, not labels)<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"tile sbi-step\" data-i=\"2\" style=\"cursor:pointer;border-left:10px solid var(--gold);opacity:.5\"><div style=\"display:flex;gap:24px;align-items:center\"><span style=\"font-family:var(--font-display);font-weight:800;font-size:60px;color:var(--gold)\">I<\u002Fspan><div><b style=\"font-size:34px\">Impact<\u002Fb><p class=\"sbi-ex\" style=\"font-size:30px;color:var(--ink-soft);margin-top:6px;display:none\">\"…which kept us all on the same page. Thank you!\"<\u002Fp><p class=\"sbi-lbl\" style=\"font-size:28px;color:var(--ink-faint);margin-top:6px\">The effect it had on you / the team<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Feedback<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · RECEIVING FEEDBACK -->\n  <section data-label=\"Receiving feedback\">\n    <div class=\"s\">\n      <span class=\"kick\">Pillar 03 · Feedback<\u002Fspan>\n      <h2 class=\"head\">Receiving it without the armour<\u002Fh2>\n      <div class=\"row\" style=\"margin-top:56px;align-items:stretch\">\n        <div class=\"col\" style=\"display:flex;flex-direction:column;gap:22px\">\n          <div class=\"bub\" style=\"font-size:30px\"><b>1 · Breathe.<\u002Fb> Your first reaction isn't your final one.<\u002Fdiv>\n          <div class=\"bub\" style=\"font-size:30px\"><b>2 · Get curious.<\u002Fb> \"Can you give me an example?\"<\u002Fdiv>\n          <div class=\"bub\" style=\"font-size:30px\"><b>3 · Say thanks.<\u002Fb> It took courage for them to tell you.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col tile s--center\" style=\"background:var(--navy);color:#fff;display:flex;justify-content:center\">\n          <div style=\"font-size:38px;line-height:1.4;font-weight:600\">Feedback is information about the <span style=\"color:var(--coral)\">work<\u002Fspan>, not a verdict on <span style=\"color:var(--gold)\">you<\u002Fspan>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Feedback<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · RECAP -->\n  <section data-label=\"Recap\">\n    <div class=\"s s--center\" style=\"background:var(--paper-2)\">\n      <span class=\"kick\">Three things to take with you<\u002Fspan>\n      <h2 class=\"head\" style=\"font-size:96px\">If you remember nothing else…<\u002Fh2>\n      <div class=\"row\" style=\"margin-top:60px;gap:34px\">\n        <div class=\"col tile\"><div style=\"font-size:30px;font-weight:800;color:var(--coral-deep)\">Listen<\u002Fdiv><p style=\"font-size:32px;margin-top:14px;line-height:1.4\">Paraphrase before you reply.<\u002Fp><\u002Fdiv>\n        <div class=\"col tile\"><div style=\"font-size:30px;font-weight:800;color:var(--blue)\">Write<\u002Fdiv><p style=\"font-size:32px;margin-top:14px;line-height:1.4\">Lead with the ask, be specific.<\u002Fp><\u002Fdiv>\n        <div class=\"col tile\"><div style=\"font-size:30px;font-weight:800;color:var(--ink)\">Feedback<\u002Fdiv><p style=\"font-size:32px;margin-top:14px;line-height:1.4\">Situation · Behaviour · Impact.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brandbar\"><span class=\"b-logo\"><span class=\"d\"><\u002Fspan>Communication<\u002Fspan><span>Recap<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · YOUR TURN -->\n  <section data-label=\"Your turn\">\n    <div class=\"s s--coral s--center\">\n      <span class=\"kick\">Now it's on you<\u002Fspan>\n      <h2 class=\"head\" style=\"font-size:118px\">Let's put it to the test<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:28px;color:#fff;opacity:.92;font-size:42px;max-width:38ch\">Two ways to prove you've got it: a quick-fire <b>quiz<\u002Fb> and a hands-on <b>partner activity<\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:22px;margin-top:50px\">\n        <a class=\"kit-btn\" href=\"../quiz/Quiz.html\" style=\"background:#fff;color:var(--coral-deep);font-size:28px\">▶ Play the Quiz<\u002Fa>\n        <a class=\"kit-btn\" href=\"../activity/Activity.html\" style=\"background:rgba(255,255,255,.18);color:#fff;font-size:28px\">🎲 Start the Activity<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"bub\" style=\"position:absolute;right:120px;bottom:130px;transform:rotate(-4deg);font-size:34px;color:var(--ink)\">Thanks for listening! 💛<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"adfdab56-3ba1-4a1f-86c8-a328cb5637dc\"><\u002Fscript>\n<script src=\"eecf0b53-308f-42f5-b169-f0f1a33ffb50\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
